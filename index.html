<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aventura do Dino</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary: #22c55e;
  --bg-dark: #020617;
  --bg-soft: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: var(--text);
}

/* HEADER */
header {
  background: rgba(2, 6, 23, 0.9);
  backdrop-filter: blur(10px);
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

h1 {
  font-size: 32px;
  color: var(--primary);
}

header ul {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 10px;
  list-style: none;
}

header a {
  color: var(--text);
  text-decoration: none;
  font-size: 18px;
  transition: 0.3s;
}

header a:hover {
  color: var(--primary);
}

/* HERO COM CAPA */
.hero {
  height: 100vh;

  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}
.btn {
  padding: 15px 35px;
  background: var(--primary);
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  margin-top: 60px;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(34,197,94,0.4);
}

.imagem {
  width: 100%;
  height: auto;
  display: block;
   opacity: 0.2; /* MAIS TRANSPARENTE */
}



.hero div {
  position: relative;
  z-index: 2;
}

.hero h2 {
  font-size: 56px;
  animation: glow 2s infinite alternate;
  position: relative;
  margin-top:-1000px;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #22c55e; }
  to { text-shadow: 0 0 25px #22c55e, 0 0 40px #22c55e; }
}

/* BOTÃO */


.btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 10px 25px rgba(34,197,94,0.6);
}

.btn:active {
  transform: scale(0.95);
}

/* SETA */
.seta {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-top: 30px solid #00ff00;
  animation: piscar 1s infinite;
  z-index: 2;
}

@keyframes piscar {
  0%, 100% {
    opacity: 1;
    filter: drop-shadow(0 0 5px #00ff00);
  }
  50% {
    opacity: 0.2;
    filter: drop-shadow(0 0 20px #00ff00);
  }
}

/* SEÇÕES */
.section {
  padding: 80px 20px;
  text-align: center;
  margin-top: -500px;
}

.section h2 {
  font-size: 36px;
  margin-bottom: 40px;
}
.section2 {
  padding: 80px 20px;
  text-align: center;
  margin-top: 20px;
}

.section2 h3 {
  font-size: 25px;
  margin-bottom: 20px;
}


/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  max-width: 1100px;
  margin: auto;
}

.card {
  background: var(--card);
  padding: 30px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 15px #22c55e;
}

.card h3 {
  margin-bottom: 10px;
  color: var(--primary);
}

/* CONTATO */
.form-contato {
  max-width: 500px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.form-contato input,
.form-contato textarea {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #0f172a;
  color: white;
  font-size: 16px;
  outline: none;
}

.form-contato textarea {
  resize: none;
  height: 120px;
}


.form-contato input:focus,
.form-contato textarea:focus {
  box-shadow: 0 0 10px #22c55e;
}

/* FOOTER */
footer {
  background: var(--bg-dark);
  text-align: center;
  padding: 25px;
  margin-top: 50px;
}
</style>
</head>

<body>

<header>
  <h1>A aventura do Dino</h1>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="sobre.html">Sobre</a></li>
    <li><a href="#contato">Contato</a></li>
    <li><a href="jogo.html">Jogar</a></li>
  </ul>
</header>
<img src="capa.png" class="imagem">
<div class="seta"></div>

<section class="hero">
  <div>
    <h2>Entre no Jogo</h2>
    <button class="btn" onclick="window.location.href='jogo.html'">
      Jogar Agora
    </button>
  </div>
</section>

<section class="section">
  <h2>Modos de Jogo</h2>
  <div class="cards">
    <div class="card">
      <h3>Sobrevivência</h3>
      <p>Um jogo misterioso e cheio de aventuras coloridas.</p>
    </div>
    <div class="card">
      <h3>Desafio</h3>
      <p>Teste seu Q.I e paciência enfrentando obstáculos difíceis.</p>
    </div>
  </div>
</section>

<section class="section2" id="contato">
  <h2>Contato</h2>
  <h3>Fale com a gente</h3>

  <form class="form-contato" onsubmit="enviarMensagem(event)">
    <input type="text" placeholder="Seu nome" required>
    <input type="email" placeholder="Seu email" required>
    <textarea placeholder="Sua mensagem" required></textarea>
    <button type="submit" class="btn">Enviar</button>
  </form>
</section>

<footer>
  <p>© 2026 AVN DO DINO</p>
</footer>

<script>
function enviarMensagem(event) {
  event.preventDefault();
  alert("Mensagem enviada com sucesso!");
}
</script>

</body>
</html>
