<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogar - Aventura do Dino</title>

<style>
:root {
  --primary: #22c55e;
  --bg-dark: #020617;
  --bg-soft: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: var(--text);
}

/* HEADER (IGUAL AO PRINCIPAL) */
header {
  background: rgba(2, 6, 23, 0.9);
  backdrop-filter: blur(10px);
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

h1 {
  color: var(--primary);
}

header ul {
  display: flex;
  justify-content: center;
  gap: 30px;
  list-style: none;
  margin-top: 10px;
}

header a {
  color: var(--text);
  text-decoration: none;
  transition: 0.3s;
}

header a:hover {
  color: var(--primary);
}
.card {
  background: var(--card);
  padding: 30px;
  border-radius: 15px;
  margin-bottom: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.3s;
}
/* BOTÃO */
.btn {
  display: inline-block;
  padding: 15px 30px;
  background: var(--primary);
  color: black;
  border-radius: 8px;
  text-decoration: none;
  text-align: center;
  margin-top: 20px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}
/* CONTEÚDO */
.container {
  text-align: center;
  padding: 80px 20px;
}

.container h2 {
  font-size: 42px;
  margin-bottom: 40px;
}

/* CARD */
.game-card {
  background: var(--card);
  display: inline-block;
  padding: 40px;
  border-radius: 20px;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.game-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 10px 5px #22c55e;
}

/* IMAGEM */
.game-icon {
  width: 150px;
  border-radius: 20px;
  margin-bottom: 15px;
}

/* BOTÃO */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 30px;
  background: var(--primary);
  color: black;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  background: #16a34a;
}
</style>

</head>

<body>

<header>
  <h1>A Aventura do Dino</h1>
 
</header>

<div class="container">
  <h2>Jogue Agora</h2>
<iframe src="jogo do site.html" width="90%" height="700px" access-control-allow-origin:*"></iframe>

</html>
